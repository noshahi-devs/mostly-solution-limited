<main class="w-full pt-20">
  <section class="py-14 lg:py-20 bg-[#f3f7fb] border-y border-[#dbe9f6]">
    <div class="max-w-[1320px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center mb-12">
        <p class="text-primary font-black uppercase tracking-[0.24em] text-[10px]">Why Choose Us</p>
        <h1 class="mt-2 text-4xl lg:text-5xl font-black uppercase tracking-tight text-primary-dark">
          Our Specialties
        </h1>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 lg:gap-5">
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 15l-3.5 2.1 1-4-3-2.6 4-.3L12 6l1.5 4.2 4 .3-3 2.6 1 4z"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">Experienced Professionals</h4></article>
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="10" width="15" height="7" rx="2"/><path d="M7 10V7a3 3 0 0 1 6 0v3"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">Mobile Service</h4></article>
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">Recovery Service Technicians</h4></article>
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="8"/><path d="M12 8v5l3 2"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">24/7 Support</h4></article>
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m14 7 3-3 3 3"/><path d="M17 4v8"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">Specialized Equipment</h4></article>
        <article class="why-card"><div class="why-icon"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5"/></svg></div><h4 class="text-primary-dark font-black uppercase text-xs tracking-[0.08em]">Cost-Effective Solutions</h4></article>
      </div>

      <div class="mt-12 text-center">
        <a [routerLink]="['/appointment']" class="inline-block rounded-xl bg-primary px-9 py-3 text-white text-xs font-black uppercase tracking-widest hover:bg-accent hover:text-primary-dark transition-colors">
          Book Appointment
        </a>
      </div>
    </div>
  </section>
</main>
